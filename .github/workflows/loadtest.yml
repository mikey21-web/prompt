name: Load Test (smoke)

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target URL to load test'
        required: true
        default: 'https://staging.promptforge.dev'
  schedule:
    # Every Monday 9am UTC. Catch creeping perf regressions in staging.
    - cron: '0 9 * * 1'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run smoke load test
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://staging.promptforge.dev' }}
        run: k6 run loadtest/smoke.k6.js -e BASE_URL=$BASE_URL
